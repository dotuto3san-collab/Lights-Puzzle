<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LightsOut</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
            touch-action: none;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 98vw;
            width: fit-content;
            position: relative;
        }
        #canvas-area {
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #1a1a1a;
            border: 2px solid #555;
        }
        #guide-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            pointer-events: none;
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
            font-size: 11px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 850px) {
            #game-container {
                flex-direction: column;
                align-items: center;
                overflow-y: auto;
                max-height: 98vh;
            }
            #inspector { width: 100% !important; height: auto !important; min-height: 400px; }
        }
        canvas {
            display: block;
            touch-action: none;
            cursor: crosshair;
        }
        #inspector {
            width: 240px;
            display: flex;
            flex-direction: column;
            background-color: #444;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            height: 480px;
            box-sizing: border-box;
        }
        #langBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(85, 85, 85, 0.8);
            font-size: 14px;
            padding: 8px 15px;
            border: 1px solid #777;
            z-index: 30;
        }
        #menuBtn {
            position: absolute;
            top: 45px; 
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid #999;
            padding: 8px 15px;
            z-index: 25;
            font-size: 13px;
            display: none;
        }
        #count-display {
            position: absolute;
            top: 85px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid #555;
            padding: 5px 10px;
            z-index: 25;
            font-size: 12px;
            color: #ff0;
            display: none;
            text-align: right;
            min-width: 60px;
            pointer-events: none;
        }
        .header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #666;
            padding-bottom: 5px;
        }
        .usage-text { font-size: 10px; color: #ccc; margin-bottom: 8px; line-height: 1.2; }
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            background: #2b2b2b;
            padding: 5px;
            border: 1px solid #222;
        }
        .click-entry {
            background-color: #555; padding: 4px; margin-bottom: 4px;
            border-radius: 3px; display: flex; gap: 4px; align-items: center;
        }
        .click-entry input {
            width: 40px; background-color: #222; color: #fff;
            border: 1px solid #777; text-align: center;
        }
        .active-entry { border: 2px solid #ffff00; }
        button { cursor: pointer; color: white; border: none; padding: 10px 5px; border-radius: 3px; font-weight: bold; }
        .btn-plus { background-color: #4a4; padding: 4px 12px; }
        .btn-start { background-color: #44a; }
        .btn-stop { background-color: #a44; }
        .btn-reset { background-color: #666; }
        .btn-retry { background-color: #d4a017; padding: 12px; font-size: 16px; width: 100%; }
        .control-group { margin-top: auto; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #666; padding-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <button id="langBtn" onclick="toggleLang()">JP / EN</button>
    
    <div id="canvas-area">
        <div id="guide-overlay">
            <span id="gClick" style="color:#fff"></span>
            <span id="gDrag" style="color:#aff"></span>
            <span id="gZoom" style="color:#aff"></span>
            <span id="gEsc" style="color:#faa"></span>
        </div>
        <button id="menuBtn" onclick="backToTitle()">MENU</button>
        <div id="count-display">MOVES: 0</div>
        <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
    </div>

    <div id="inspector" style="display: none;">
        <div class="header">
            <span id="labelAutoPlay">Auto Play</span>
            <button class="btn-plus" onclick="addEntry()">+</button>
        </div>
        <div id="labelUsage" class="usage-text"></div>
        <div id="scrollArea" class="scroll-area"></div>
        
        <div class="control-group">
            <label><span id="labelSpeed">Speed</span>: x<span id="speedVal">1.0</span></label>
            <input type="range" id="speedRange" min="0.5" max="10.0" step="0.1" value="1.0" oninput="updateSpeed(this.value)">
            <button id="autoStartBtn" class="btn-start" onclick="toggleAutoPlay()">START AUTO</button>
            <button id="btnResetBoard" class="btn-reset" onclick="resetBoard()">RESET BOARD</button>
            <div id="winControls" style="display:none; margin-top:5px;">
                <button id="btnRetryLevel" class="btn-retry" onclick="retryGame()">RETRY LEVEL</button>
            </div>
        </div>
    </div>
</div>

<script>
const i18n = {
    ja: {
        rules: [
            "【遊び方】",
            "・マスをタップすると、そのマスと上下左右の色が反転します。",
            "・画面内の全マスを同じ色に揃えればクリアです！",
            "",
            "【モード】",
            "・Normal: 全て消灯した状態から開始します。",
            "・Challenge: ランダムに点灯した状態から開始します。"
        ],
        range: "サイズ範囲", titleDesc: "サイズをタップして変更、モードを選んで開始", 
        normalBtn: "Normal Mode", challengeBtn: "Challenge Mode",
        autoPlay: "Auto Play (自動実行)", usage: "＋ボタンで座標を追加します。STARTを押すとリストの順に自動反転させます。", speed: "実行速度",
        startAuto: "START AUTO", stopAuto: "STOP AUTO", resetBoard: "盤面をリセット", retryLevel: "レベルをやり直す",
        guideClick: "タップ：反転", guideDrag: "右ドラッグ：カメラ移動", guideZoom: "ホイール：ズーム", guideEsc: "ESC：タイトルへ",
        win: "CLEAR!!", promptCols: "列数(横マスの数)を入力してください", promptRows: "行数(縦マスの数)を入力してください",
        moves: "手数"
    },
    en: {
        rules: [
            "【HOW TO PLAY】",
            "• Tap a tile to flip its color and its neighbors.",
            "• Clear by making all tiles the same color!",
            "",
            "【MODES】",
            "• Normal: Starts with all tiles off.",
            "• Challenge: Starts with random tiles on."
        ],
        range: "Size Range", titleDesc: "Tap size to change, pick a mode to start",
        normalBtn: "Normal Mode", challengeBtn: "Challenge Mode",
        autoPlay: "Auto Play", usage: "Add coordinates with '+'. Press START to run them in order.", speed: "Speed",
        startAuto: "START AUTO", stopAuto: "STOP AUTO", resetBoard: "RESET BOARD", retryLevel: "RETRY LEVEL",
        guideClick: "Tap: Flip", guideDrag: "RightDrag: Move", guideZoom: "Wheel: Zoom", guideEsc: "ESC: Back",
        win: "YOU WIN!", promptCols: "Enter columns count", promptRows: "Enter rows count",
        moves: "MOVES"
    }
};

let currentLang = 'ja';
const WIDTH = 640;
const HEIGHT = 480;
const MIN_LIMIT = 2;
const MAX_LIMIT = 128;

let state = 'TITLE', colsInput = "5", rowsInput = "5", activeInput = 'cols', board = null;
let isWin = false, hasStarted = false, scale = 1.0, offsetX = 0, offsetY = 0;
let isDragging = false, lastMouseX = 0, lastMouseY = 0, baseCellSize = 50;
let autoEntries = [], autoIndex = -1, isAutoPlaying = false, autoTimer = null, autoSpeed = 1000;
let moveCount = 0;
let gameMode = 'NORMAL';
let initialBoardState = []; // リトライ用に初期状態を保存

class Board {
    constructor(w, h) {
        this.width = w; this.height = h;
        this.cells = new Array(w * h).fill(false);
    }
    toggle(x, y) {
        const targets = [[x, y], [x, y - 1], [x, y + 1], [x - 1, y], [x + 1, y]];
        targets.forEach(([tx, ty]) => {
            if (tx >= 0 && tx < this.width && ty >= 0 && ty < this.height) {
                this.cells[ty * this.width + tx] = !this.cells[ty * this.width + tx];
            }
        });
    }
}

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const inspector = document.getElementById('inspector'), menuBtn = document.getElementById('menuBtn'), langBtn = document.getElementById('langBtn'), guide = document.getElementById('guide-overlay'), countDisplay = document.getElementById('count-display');
canvas.width = WIDTH; canvas.height = HEIGHT;

function toggleLang() { currentLang = currentLang === 'ja' ? 'en' : 'ja'; updateUIText(); draw(); }

function updateUIText() {
    const t = i18n[currentLang];
    document.getElementById('labelAutoPlay').innerText = t.autoPlay;
    document.getElementById('labelUsage').innerText = t.usage;
    document.getElementById('labelSpeed').innerText = t.speed;
    document.getElementById('btnResetBoard').innerText = t.resetBoard;
    document.getElementById('btnRetryLevel').innerText = t.retryLevel;
    document.getElementById('autoStartBtn').innerText = isAutoPlaying ? t.stopAuto : t.startAuto;
    document.getElementById('gClick').innerText = t.guideClick;
    document.getElementById('gDrag').innerText = t.guideDrag;
    document.getElementById('gZoom').innerText = t.guideZoom;
    document.getElementById('gEsc').innerText = t.guideEsc;
    updateMoveDisplay();
}

function updateMoveDisplay() {
    countDisplay.innerText = `${i18n[currentLang].moves}: ${moveCount}`;
}

function shuffleBoard() {
    // 適当な回数（面積と同じくらい）ランダムにクリックして「解ける盤面」を作る
    const steps = board.width * board.height;
    for(let i = 0; i < steps; i++) {
        const rx = Math.floor(Math.random() * board.width);
        const ry = Math.floor(Math.random() * board.height);
        board.toggle(rx, ry);
    }
}

function initGame(mode) {
    gameMode = mode;
    let c = parseInt(colsInput) || MIN_LIMIT, r = parseInt(rowsInput) || MIN_LIMIT;
    board = new Board(c, r);
    
    if (gameMode === 'CHALLENGE') {
        shuffleBoard();
    }
    
    // 現在の盤面を初期状態として保存
    initialBoardState = [...board.cells];
    
    isWin = false; hasStarted = false; autoIndex = -1; moveCount = 0;
    document.getElementById('winControls').style.display = 'none';
    baseCellSize = Math.min((WIDTH - 80) / c, (HEIGHT - 80) / r, 80);
    scale = 1.0; offsetX = (WIDTH - c * baseCellSize) / 2; offsetY = (HEIGHT - r * baseCellSize) / 2;
    state = 'PLAY'; 
    inspector.style.display = 'flex'; 
    menuBtn.style.display = 'block'; 
    countDisplay.style.display = 'block';
    langBtn.style.display = 'none'; 
    guide.style.display = 'flex';
    updateUIText(); draw();
}

function backToTitle() { 
    stopAutoPlay(); 
    state = 'TITLE'; 
    moveCount = 0;
    inspector.style.display = 'none'; 
    menuBtn.style.display = 'none'; 
    countDisplay.style.display = 'none';
    langBtn.style.display = 'block'; 
    guide.style.display = 'none'; 
    draw(); 
}

function draw() { ctx.clearRect(0, 0, WIDTH, HEIGHT); if (state === 'TITLE') drawTitle(); else drawPlay(); }

function drawTitle() {
    const t = i18n[currentLang];
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 48px sans-serif"; ctx.fillText("LightsOut", WIDTH / 2, 80);
    ctx.font = "14px sans-serif"; ctx.textAlign = "left"; ctx.fillStyle = "#eee";
    t.rules.forEach((line, i) => ctx.fillText(line, WIDTH / 2 - 200, 130 + i * 22));
    ctx.textAlign = "center"; ctx.font = "24px sans-serif";
    ctx.fillStyle = (activeInput === 'cols') ? "#ffff00" : "white"; ctx.fillText(`Cols: ${colsInput}`, WIDTH / 2 - 80, 325);
    ctx.fillStyle = (activeInput === 'rows') ? "#ffff00" : "white"; ctx.fillText(`Rows: ${rowsInput}`, WIDTH / 2 + 80, 325);
    ctx.font = "13px sans-serif"; ctx.fillStyle = "#aaa";
    ctx.fillText(`${t.range}: ${MIN_LIMIT} - ${MAX_LIMIT}`, WIDTH / 2, 355);
    ctx.fillText(t.titleDesc, WIDTH / 2, 375);
    
    // Normal Mode Button
    ctx.fillStyle = "#44a"; ctx.fillRect(WIDTH/2 - 210, 410, 200, 45);
    ctx.fillStyle = "white"; ctx.font = "bold 18px sans-serif"; ctx.fillText(t.normalBtn, WIDTH/2 - 110, 440);
    
    // Challenge Mode Button
    ctx.fillStyle = "#a44"; ctx.fillRect(WIDTH/2 + 10, 410, 200, 45);
    ctx.fillStyle = "white"; ctx.font = "bold 18px sans-serif"; ctx.fillText(t.challengeBtn, WIDTH/2 + 110, 440);
}

function drawPlay() {
    const curSize = baseCellSize * scale, gap = curSize > 5 ? 1 : 0;
    const startX = Math.max(0, Math.floor(-offsetX / curSize)), endX = Math.min(board.width, Math.ceil((WIDTH - offsetX) / curSize));
    const startY = Math.max(0, Math.floor(-offsetY / curSize)), endY = Math.min(board.height, Math.ceil((HEIGHT - offsetY) / curSize));
    for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
            ctx.fillStyle = board.cells[y * board.width + x] ? '#ff0' : '#333';
            ctx.fillRect(offsetX + x * curSize, offsetY + y * curSize, curSize - gap, curSize - gap);
        }
    }
    if (isWin) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 40px sans-serif"; ctx.fillText(i18n[currentLang].win, WIDTH / 2, HEIGHT / 2);
    }
}

function handleInteraction(ex, ey, isRight) {
    const rect = canvas.getBoundingClientRect(), mx = (ex - rect.left) * (WIDTH / rect.width), my = (ey - rect.top) * (HEIGHT / rect.height);
    if (state === 'TITLE') {
        // Normal Button Click
        if (mx > WIDTH/2 - 210 && mx < WIDTH/2 - 10 && my > 410 && my < 455) initGame('NORMAL');
        // Challenge Button Click
        else if (mx > WIDTH/2 + 10 && mx < WIDTH/2 + 210 && my > 410 && my < 455) initGame('CHALLENGE');
        // Size Input Click
        else if (my > 300 && my < 345) {
            activeInput = (mx < WIDTH/2) ? 'cols' : 'rows';
            let v = prompt(i18n[currentLang][activeInput === 'cols'?'promptCols':'promptRows'], activeInput === 'cols'?colsInput:rowsInput);
            if (v !== null) { if (activeInput==='cols') colsInput=forceClamp(v); else rowsInput=forceClamp(v); }
        }
        draw();
    } else if (state === 'PLAY') {
        if (isRight) { isDragging = true; lastMouseX = mx; lastMouseY = my; }
        else if (!isWin && !isAutoPlaying) {
            const curSize = baseCellSize * scale, x = Math.floor((mx - offsetX) / curSize), y = Math.floor((my - offsetY) / curSize);
            if (x >= 0 && y >= 0 && x < board.width && y < board.height) { 
                board.toggle(x, y); 
                hasStarted = true; 
                moveCount++;
                updateMoveDisplay();
                checkWin(); draw(); 
            }
        }
    }
}

canvas.addEventListener('mousedown', (e) => handleInteraction(e.clientX, e.clientY, e.button === 2 || e.button === 1));
window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect(), mx = (e.clientX - rect.left) * (WIDTH / rect.width), my = (e.clientY - rect.top) * (HEIGHT / rect.height);
    offsetX += mx - lastMouseX; offsetY += my - lastMouseY; lastMouseX = mx; lastMouseY = my; draw();
});
window.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('wheel', (e) => {
    if (state !== 'PLAY') return; e.preventDefault();
    const oldScale = scale; scale = Math.min(Math.max(0.1, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 30);
    const rect = canvas.getBoundingClientRect(), mx = (e.clientX - rect.left) * (WIDTH / rect.width), my = (e.clientY - rect.top) * (HEIGHT / rect.height);
    offsetX = mx - (mx - offsetX) * (scale / oldScale); offsetY = my - (my - offsetY) * (scale / oldScale); draw();
}, { passive: false });

function forceClamp(v) { let n = parseInt(v.replace(/[^0-9]/g, "")); return isNaN(n) ? "5" : Math.min(MAX_LIMIT, Math.max(MIN_LIMIT, n)).toString(); }
function checkWin() { if (hasStarted && (board.cells.every(c => !c) || board.cells.every(c => c))) { isWin = true; stopAutoPlay(); document.getElementById('winControls').style.display = 'block'; } }
function toggleAutoPlay() { if (isAutoPlaying) stopAutoPlay(); else { if (autoEntries.length === 0) return; isAutoPlaying = true; updateUIText(); document.getElementById('autoStartBtn').className = "btn-stop"; processNextAuto(); } }
function stopAutoPlay() { isAutoPlaying = false; autoIndex = -1; clearTimeout(autoTimer); updateUIText(); document.getElementById('autoStartBtn').className = "btn-start"; renderInspector(); }
function processNextAuto() {
    if (!isAutoPlaying || isWin) return;
    autoIndex++; if (autoIndex >= autoEntries.length) autoIndex = 0;
    const e = autoEntries[autoIndex];
    if (e.x < board.width && e.y < board.height) { 
        board.toggle(e.x, e.y); 
        hasStarted = true; 
        moveCount++;
        updateMoveDisplay();
        checkWin(); 
    }
    renderInspector(); draw(); autoTimer = setTimeout(processNextAuto, autoSpeed);
}
function addEntry() { autoEntries.push({ x: 0, y: 0, id: Date.now() }); renderInspector(); }
function removeEntry(id) { autoEntries = autoEntries.filter(e => e.id !== id); renderInspector(); }
function renderInspector() {
    const area = document.getElementById('scrollArea'); area.innerHTML = '';
    autoEntries.forEach((e, i) => {
        const d = document.createElement('div'); d.className = `click-entry ${i === autoIndex ? 'active-entry' : ''}`;
        d.innerHTML = `<span>#${i}</span>X:<input type="number" value="${e.x}" oninput="autoEntries[${i}].x=parseInt(this.value)||0">Y:<input type="number" value="${e.y}" oninput="autoEntries[${i}].y=parseInt(this.value)||0"><button style="background:#a44;padding:2px 5px;margin-left:auto" onclick="removeEntry(${e.id})">×</button>`;
        area.appendChild(d);
    });
}
function updateSpeed(v) { autoSpeed = 1000 / parseFloat(v); document.getElementById('speedVal').innerText = parseFloat(v).toFixed(1); }
function resetBoard() { 
    if (!board) return; 
    // Challengeモードでも開始時の状態に戻るようにする
    board.cells = [...initialBoardState]; 
    isWin = false; hasStarted = false; moveCount = 0;
    updateMoveDisplay();
    document.getElementById('winControls').style.display = 'none'; draw(); 
}
function retryGame() { resetBoard(); if (isAutoPlaying) stopAutoPlay(); }

window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { backToTitle(); return; }
    // EnterはNormalModeで開始するようにデフォルト設定
    if (state === 'TITLE' && e.key === 'Enter') initGame('NORMAL');
});

updateUIText(); draw();
</script>
</body>
</html>
